<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#10141a">
  <title>Gold Journal — XAUUSD Trading Journal</title>
  <meta name="description" content="A cloud-synced XAUUSD (Gold) trading journal.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gold Journal">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 (layout/grid/utilities) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.417.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="css/styles.css">

  <!-- Supabase config injected at build time from environment variables
       (see build.js / netlify.toml). Not committed to source control. -->
  <script src="js/env.js"></script>
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-logo"><div class="brand-mark xl">AU</div></div>
      <div class="splash-name">Gold Journal</div>
      <div class="splash-bar"><span></span></div>
      <div class="splash-sub">Loading your trading desk…</div>
    </div>
  </div>

  <div id="app-root"></div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Global offline banner -->
  <div id="offline-banner" class="offline-banner"><i data-lucide="wifi-off"></i> You're offline — changes will sync when the connection returns.</div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Offline banner wiring (independent of module load).
    (function () {
      const b = document.getElementById("offline-banner");
      const upd = () => b.classList.toggle("show", !navigator.onLine);
      window.addEventListener("online", upd);
      window.addEventListener("offline", upd);
      upd();
      window.lucide?.createIcons({ nameAttr: "data-lucide" });
    })();
  </script>
</body>
</html>
